# 互动百科 (baike) — app 容器示例
# MySQL 与 nginx 假定由外部基础设施提供,本 compose 仅展示 baike app 启动方式
# 使用方法:
#   1. 准备 .env.prod.local(从模板 cp 出来):
#        cp .env.prod .env.prod.local
#        vim .env.prod.local   # 填 DB_PASSWORD / FLASK_SECRET
#   2. 构建并拉起: docker compose build && docker compose up -d
#   3. 验证: curl http://localhost:8000/user/home
services:
  baike:
    image: baike:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env.prod.local   # 容器内 APP_ENV=prod,DB_*,FLASK_SECRET 全部从这一文件注入
    restart: always
