{% extends 'base.html' %}

{% block title %}{{ error.code }} {{ error.name }} — 641 大百科{% endblock %}

{% block content %}
  <article style="text-align:center;padding:4rem 1rem;">
    <h1 style="font-size:6rem;margin:0;">{{ error.code }}</h1>
    <p style="font-size:1.5rem;">{{ error.name }}</p>
    <p>{{ error.description }}</p>
    <a href="{{ url_for('apple.home') }}" role="button">返回首页</a>
  </article>
{% endblock %}
