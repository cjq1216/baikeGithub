{% extends 'base.html' %}

{% block title %}{{ error.code }} {{ error.name }} — 641 大百科{% endblock %}

{% block content %}
  <article class="baike-error-page">
    <p class="baike-error-code">{{ error.code }}</p>
    <p class="baike-error-name">{{ error.name }}</p>
    <p class="baike-error-desc">{{ error.description }}</p>
    <a href="{{ url_for('apple.home') }}" role="button">返回首页</a>
  </article>
{% endblock %}
