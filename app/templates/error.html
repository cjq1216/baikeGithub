<!DOCTYPE html>
<html lang="zh-cn">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="">
        <meta name="author" content="">
        <title>{{ error.code }} {{ error.name }}</title>

        <link rel='stylesheet' href="../static/stylesheets/style.css">
        <!-- Bootstrap -->
        <link rel="stylesheet" href="../static/stylesheets/bootstrap.min.css">

        <!-- 最新的 Bootstrap 核心 JavaScript 文件 -->
        <link href="../static/stylesheets/mycss/signin.css" rel="stylesheet">

    </head>

    <body>
        <div class="container">
            <div class="form-signin" style="text-align:center;">
                <h1>{{ error.code }}</h1>
                <p>{{ error.description }}</p>
                {% with messages = get_flashed_messages() %}
                {% if messages %}
                <ul class=flashes>
                    {% for message in messages %}
                    <li class="error">{{ message }}</li>
                    {% endfor %}
                </ul>
                {% endif %}
                {% endwith %}
                <a href="{{ url_for('apple.home') }}" class="btn btn-primary">返回首页</a>
            </div>
        </div> <!-- /container -->

        <!-- Bootstrap core JavaScript
            ================================================== -->
            <!-- Placed at the end of the document so the pages load faster -->
        <script src="../static/javascripts/jquery-1.11.3.min.js"></script>
        <script src="../static/javascripts/bootstrap.min.js"></script>
        <script src="../static/javascripts/docs.min.js"></script>
    </body>
</html>
