{% extends 'base.html' %}

{% block title %}登录 — 641 大百科{% endblock %}

{% block content %}
  <article class="baike-form-card">
    <h2>登录</h2>
    <form action="{{ url_for('api.loginBusiness') }}" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>
        用户名
        <input type="text" name="name" required autofocus>
      </label>
      <label>
        密码
        <input type="password" name="password" required>
      </label>
      <button type="submit">登录</button>
      <p><small>没有账号? <a href="{{ url_for('apple.regist') }}">注册</a></small></p>
    </form>
  </article>
{% endblock %}
