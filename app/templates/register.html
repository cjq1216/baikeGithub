{% extends 'base.html' %}

{% block title %}注册 — 641 大百科{% endblock %}

{% block content %}
  <article style="max-width:400px;margin:2rem auto;">
    <h2>注册</h2>
    <form action="{{ url_for('api.registBusiness') }}" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>
        用户名 (6-30 字符)
        <input type="text" name="name" required minlength="6" maxlength="30">
      </label>
      <label>
        密码 (6-30 字符)
        <input type="password" name="password" required minlength="6" maxlength="30">
      </label>
      <button type="submit">注册</button>
      <p><small>已有账号? <a href="{{ url_for('apple.login') }}">登录</a></small></p>
    </form>
  </article>
{% endblock %}
