{% extends 'base.html' %}

{% block title %}添加词条 — 641 大百科{% endblock %}

{% block head %}
  <link rel="stylesheet" href="{{ url_for('static', filename='stylesheets/quill/quill.snow.css') }}">
{% endblock %}

{% block content %}
  <article>
    <h2>添加词条</h2>
  </article>

  <form action="/api/add" method="post" class="baike-form-card" style="max-width:760px;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label>
      词条标题
      <input type="text" name="title" required maxlength="40"
             value="{{ prefill_title or '' }}">
    </label>

    <label>词条正文</label>
    <div class="baike-quill-host">
      <div id="editor"></div>
    </div>
    <input type="hidden" name="content" id="content-hidden">

    <button type="submit">提交</button>
  </form>
{% endblock %}

{% block bottom %}
  <script src="{{ url_for('static', filename='javascripts/quill/quill.min.js') }}"></script>
  <script>
    var quill = new Quill('#editor', {
      theme: 'snow',
      modules: {
        toolbar: [
          ['bold', 'italic', 'underline'],
          [{ 'list': 'ordered' }, { 'list': 'bullet' }],
          [{ 'header': [1, 2, 3, false] }],
          ['blockquote', 'link'],
          ['clean']
        ]
      }
    });
    // 提交前同步 Quill HTML 到 hidden input
    document.querySelector('form').addEventListener('submit', function() {
      document.getElementById('content-hidden').value = quill.root.innerHTML;
    });
  </script>
{% endblock %}
