{% extends 'base.html' %}

{% block title %}修改词条 — 641 大百科{% endblock %}

{% block head %}
  <link rel="stylesheet" href="{{ url_for('static', filename='stylesheets/quill/quill.snow.css') }}">
{% endblock %}

{% block content %}
  <article>
    <h2>修改词条</h2>
  </article>

  <form action="/api/modify" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label>
      词条标题
      <input type="text" name="newTitle" required maxlength="40" readonly
             value="{{ fullcon.title if fullcon else '' }}">
    </label>

    <label>词条正文</label>
    {# Plan 4.1 视图层暂未传 fullcon (留给 Plan 4.3),此处预填空,编辑器空白启动 #}
    <div id="editor" style="height:300px; background:white;">
      {{ fullcon.content | safe if fullcon else '' }}
    </div>
    <input type="hidden" name="newContent" id="content-hidden">

    <button type="submit">确认修改</button>
    <a href="{{ url_for('apple.home') }}" role="button" class="secondary">取消</a>
  </form>
{% endblock %}

{% block bottom %}
  <script src="{{ url_for('static', filename='javascripts/quill/quill.min.js') }}"></script>
  <script>
    var quill = new Quill('#editor', {
      theme: 'snow',
      modules: {
        toolbar: [
          ['bold', 'italic', 'underline'],
          [{ 'list': 'ordered' }, { 'list': 'bullet' }],
          [{ 'header': [1, 2, 3, false] }],
          ['blockquote', 'link'],
          ['clean']
        ]
      }
    });
    // 提交前同步 Quill HTML 到 hidden input
    document.querySelector('form').addEventListener('submit', function() {
      document.getElementById('content-hidden').value = quill.root.innerHTML;
    });
  </script>
{% endblock %}
